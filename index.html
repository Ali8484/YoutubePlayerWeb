<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>درس التحول من النظام الثنائي إلى العشري</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { max-width: 880px; width: 100%; background: white; border-radius: 24px; padding: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 16px; background: #000; box-shadow: 0 8px 25px rgba(0,0,0,0.2); }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .info { padding: 20px 5px 5px; }
        .info h1 { font-size: 1.7rem; color: #0b1e33; }
        .info .meta { display: flex; flex-wrap: wrap; gap: 12px; margin: 10px 0; }
        .info .meta span { background: #eef2f6; padding: 4px 16px; border-radius: 30px; font-size: 0.9rem; }
        .status-ok { background: #28a745 !important; color: white; }
        .footer { text-align: center; margin-top: 20px; color: #8896a3; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube.com/embed/3dcLJI8PlaQ" 
                title="الحاسوب الاول متوسط - التحول من النظام الثنائي الى العشري" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                referrerpolicy="strict-origin-when-cross-origin" 
                allowfullscreen>
            </iframe>
        </div>
        <div class="info">
            <h1>🖥️ الحاسوب الأول متوسط - الوحدة 1 (الفصل الثاني)</h1>
            <div class="meta">
                <span>📘 التحول من الثنائي إلى العشري</span>
                <span class="status-ok">✅ التضمين مفعل</span>
            </div>
            <p style="color: #28a745;">✔️ تم تفعيل خاصية التضمين من إعدادات القناة بنجاح.</p>
        </div>
        <div class="footer">جميع الحقوق محفوظة - العراقية التربوية</div>
    </div>
</body>
</html>
